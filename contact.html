<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="contact-page">
        <section class="contact">

            <h2 class="contact__title">Contact Us</h2>

            <p class="contact__desc">
                Have questions about workouts, plans, or subscriptions?
                Our support team is here to help you stay on track with your fitness goals.
            </p>

            <div class="contact__wrapper">

                <!-- Left Side Info -->
                <div class="contact__info">

                    <div class="contact__item">
                        <h4>Email</h4>
                        <p>support@fittrack.com</p>
                    </div>

                    <div class="contact__item">
                        <h4>Phone</h4>
                        <p>+91 98765 43210</p>
                    </div>

                    <div class="contact__item">
                        <h4>Working Hours</h4>
                        <p>Mon - Sat : 9AM - 6PM</p>
                    </div>

                </div>

                <!-- Right Side Form -->
                <form class="contact__form">

                    <div class="contact__group">
                        <label>Name</label>
                        <input type="text" placeholder="Enter your name">
                    </div>

                    <div class="contact__group">
                        <label>Email</label>
                        <input type="email" placeholder="Enter your email">
                    </div>

                    <div class="contact__group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="Write your message"></textarea>
                    </div>

                    <button class="contact__btn">Send Message</button>

                </form>

            </div>

        </section>

        <a href="index.html" class="floating-home">
            <i class="fa-solid fa-house"></i>
        </a>

    </div>

</body>

</html>
